<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>LH — Sinapse I</title>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- L: vertical pill + horizontal pill at base, perfectly rounded -->
  <rect x="28" y="30" width="22" height="120" rx="11" fill="url(#grad)"/>
  <rect x="28" y="128" width="60" height="22" rx="11" fill="url(#grad)"/>
  <!-- Synapse gap: 8px -->
  <!-- H: left vertical + crossbar + right vertical -->
  <rect x="96" y="30" width="22" height="120" rx="11" fill="url(#grad)"/>
  <rect x="96" y="85" width="60" height="22" rx="11" fill="url(#grad)"/>
  <rect x="134" y="30" width="22" height="120" rx="11" fill="url(#grad)"/>
</svg>
