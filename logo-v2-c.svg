<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>LH — Coluna</title>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Central spine: the strong shared vertical axis -->
  <rect x="89" y="24" width="22" height="152" rx="11" fill="url(#grad)"/>
  <!-- L: branches left from spine -->
  <!-- L vertical (left arm) -->
  <rect x="28" y="24" width="18" height="110" rx="9" fill="#2563EB"/>
  <!-- L base connecting to spine -->
  <rect x="28" y="116" width="83" height="18" rx="9" fill="#2563EB"/>
  <!-- H: branches right from spine -->
  <!-- H right vertical -->
  <rect x="154" y="24" width="18" height="152" rx="9" fill="#2563EB"/>
  <!-- H crossbar connecting spine to right -->
  <rect x="89" y="85" width="83" height="18" rx="9" fill="#2563EB"/>
  <!-- Neural nodes at junctions -->
  <circle cx="100" cy="33" r="6" fill="#06B6D4"/>
  <circle cx="100" cy="94" r="6" fill="#06B6D4"/>
  <circle cx="100" cy="125" r="6" fill="#06B6D4"/>
</svg>
