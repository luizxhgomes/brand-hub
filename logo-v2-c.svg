<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>LH — Coluna Vertebral</title>
  <!-- Central spine (shared vertical) with L and H branching from it -->
  <!-- The spine is the "sistema nervoso central" — the axis everything connects to -->

  <!-- Central spine: strong vertical line -->
  <path d="M32 4 L32 60" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>

  <!-- L branches: extend left from the spine -->
  <!-- L vertical branch (upper left) -->
  <path d="M32 10 L16 10 L16 42" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- L base branch (curves from vertical to spine base) -->
  <path d="M16 42 Q16 50, 24 50 L32 50" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- H branches: extend right from the spine -->
  <!-- H right vertical -->
  <path d="M32 10 L50 10 L50 50" stroke="#2563EB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- H crossbar from spine to right vertical -->
  <path d="M32 30 L50 30" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <!-- H base connects back -->
  <path d="M50 50 L32 50" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>

  <!-- Neural nodes at key junction points -->
  <circle cx="32" cy="10" r="3" fill="#2563EB"/>
  <circle cx="32" cy="30" r="3" fill="#2563EB"/>
  <circle cx="32" cy="50" r="3" fill="#2563EB"/>
  <circle cx="16" cy="10" r="2.5" fill="#06B6D4"/>
  <circle cx="50" cy="10" r="2.5" fill="#06B6D4"/>
  <circle cx="50" cy="30" r="2.5" fill="#06B6D4"/>
</svg>
