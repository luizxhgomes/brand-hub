<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>LH — Fluxo Contínuo</title>
  <!-- LH as one continuous elegant stroke — persistence, never breaks -->
  <!-- L: vertical down + curved base right -->
  <path d="M14 8 L14 50 Q14 56, 20 56 L28 56" fill="none" stroke="#2563EB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- H: left vertical + crossbar + right vertical, connected as one path -->
  <path d="M36 56 L36 8 M36 32 Q42 30, 50 32 M50 8 L50 56" fill="none" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
</svg>
